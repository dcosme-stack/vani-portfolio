

<div class="gallery-container">
        {% for item in items %}
                {% if item.image %}
                <div>
                        <div>
                                <h3>{{ item.title }}</h3>
                                <img src="{{ item.image.url }}" alt="{{ item.title }}" title="{{ item.title }}" onclick="openModal(this)">
                        </div>
                        <div class="photo-description">{{ item.description }}</div>
                </div>
                {% endif %}
                {% if item.youtube_id %}
                <div>
                        <div>
                                <h3>{{ item.title }}</h3>
                                <iframe width="420" height="345" src="https://www.youtube.com/embed/{{ item.youtube_id }}" allow="fullscreen">
                                </iframe>
                        </div>
                        <div class="video-description">{{ item.description }}</div>
                </div>
                {% endif %}
        {% empty %}
        <p>No items to display.</p>
        {% endfor %}
</div>
<div id="modal-container" onclick="closeModal()">
        <div id="modal-inner">
            <img src="" alt="" id="modal-img">
            <span class="close-modal" onclick="closeModalX()">X</span>
        </div>
    </div>
