<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="theme-color" content="#maroon">

<title>{{ seo.title }}</title>
<meta name="description" content="{{ seo.description }}">
<link rel="canonical" href="{{ seo.url }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ seo.title }}">
<meta property="og:description" content="{{ seo.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ seo.url }}">
<meta property="og:image" content="{{ seo.image|default:'/static/images/og/vanishree_kulkarni.jpg' }}">

<!-- Twitter Cards -->
<meta name="twitter:card" content="{{ seo.twitter_card|default:'summary_large_image' }}">
<meta name="twitter:title" content="{{ seo.title }}">
<meta name="twitter:description" content="{{ seo.description }}">
<meta name="twitter:image" content="{{ seo.image|default:'/static/images/og/vanishree_kulkarni.jpg' }}">
