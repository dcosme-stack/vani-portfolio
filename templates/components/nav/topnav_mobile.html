{% load navigation %}

<nav class="mobile-nav">
    <div class="hamburger-nav">
        <div class="top-nav-title">
            <a href="{% url 'pages:homepage' %}">VANISHREE KULKARNI</a>
        </div>
        <button
            class="hamburger"
            aria-label="Menu"
            aria-expanded="false"
            aria-controls="mobile-menu"
        >
        ☰
        </button>
    </div>
</nav>

<ul id="mobile-menu" class="mobile-menu">
    <button class="mobile-close" aria-label="Close menu">✕</button>
{% for item in mobile_nav %}
    <li class="{% if request|is_active:item.active_prefix %}top-nav-active{% endif %}">
        <a href="{{ item.url }}">{{ item.label }}</a>
    </li>
    {% endfor %}
</ul>
