{% load navigation %}

<nav class="mobile-nav">
    <div>
        <button
            class="hamburger"
            aria-label="Menu"
            aria-expanded="false"
            aria-controls="mobile-menu"
        >
        ☰ VANISHREE KULKARNI
        </button>
    </div>

    <ul id="mobile-menu" class="mobile-menu" hidden>
    {% for item in mobile_nav %}
        <li class="{% if request|is_active:item.active_prefix %}top-nav-active{% endif %}">
            <a href="{{ item.url }}">{{ item.label }}</a>
        </li>
        {% endfor %}
    </ul>
</nav>
