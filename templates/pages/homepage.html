{% extends "base.html" %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/pages/homepage.css' %}">
{% endblock %}

{% block content %}
<section class="hero">
    {% if homepage.hero_image %}
        <img
            src="{{ homepage.hero_image.url }}"
            alt="Hero Image - Vanishree Kulkarni"
            title="Vanishree Kulkarni"
            alt="Portrait of actress Vanishree Kulkarni"
            loading="eager"
            fetchpriority="high"
            class="hero_image"
        />

        <div class="hero_overlay"></div>

        <div class="hero_content">
            <h1>{{ homepage.main_title }}</h1>
            <p>{{ homepage.description|safe }}</p>
            <a href="{% url 'pages:about' %}" class="call-to-action">FIND OUT MORE &xrarr;</a>
        </div>
    {% endif %}
</section>
{% endblock %}
