{% extends "base.html" %}
{% load static %}

{% block content %}
<br />
<section class="lp-container">
    {% if homepage.hero_image %}
    <div class="lp-left-section">
        <img src="{{ homepage.hero_image.url }}" alt="Hero Image - Vanishree Kulkarni" title="Vanishree Kulkarni" />
    </div>
    {% endif %}
    <div class="lp-right-section">
        <h1>{{ homepage.main_title }}</h1>
        <br />
        <article>{{ homepage.description|safe }}</article>
        <br />
        <p class="social-media-icon">
            <a href="{{ site.facebook_url }}" target="_blank"><img src="{% static 'images/socialmedia/facebook.svg' %}" alt="Facebook icon"></a>
            <a href="{{ site.youtube_url }}" target="_blank"><img src="{% static 'images/socialmedia/youtube.svg' %}" alt="Youtube icon"></a>
            <a href="{{ site.instagram_url }}" target="_blank"><img src="{% static 'images/socialmedia/instagram.svg' %}" alt="Instagram icon"></a>
            <a href="{{ site.email }}" target="_blank"><img src="{% static 'images/socialmedia/email.svg' %}" alt="Email icon"></a>
        </p>
    </div>
</section>
{% endblock %}
