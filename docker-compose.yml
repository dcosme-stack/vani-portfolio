version: "3.9"

services:
  web:
    build: .
    container_name: vani_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: vani_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: vani_db
      POSTGRES_USER: vani_user
      POSTGRES_PASSWORD: strongpassword

  redis:
    image: redis:7
    container_name: vani_redis
    restart: always

  nginx:
    image: nginx:latest
    container_name: vani_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: